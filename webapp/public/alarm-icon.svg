<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Hintergrund -->
  <circle cx="50" cy="50" r="50" fill="#1e1e2e"/>

  <!-- Glöckchen links -->
  <circle cx="22" cy="28" r="9" fill="#89b4fa"/>
  <!-- Glöckchen rechts -->
  <circle cx="78" cy="28" r="9" fill="#89b4fa"/>

  <!-- Uhr-Körper -->
  <circle cx="50" cy="54" r="32" fill="#313244" stroke="#89b4fa" stroke-width="3"/>

  <!-- Zifferblatt-Punkte -->
  <circle cx="50" cy="26" r="2" fill="#cdd6f4"/>
  <circle cx="50" cy="82" r="2" fill="#cdd6f4"/>
  <circle cx="22" cy="54" r="2" fill="#cdd6f4"/>
  <circle cx="78" cy="54" r="2" fill="#cdd6f4"/>

  <!-- Minutenzeiger -->
  <line x1="50" y1="54" x2="50" y2="34" stroke="#cdd6f4" stroke-width="3" stroke-linecap="round"/>
  <!-- Stundenzeiger -->
  <line x1="50" y1="54" x2="65" y2="54" stroke="#cdd6f4" stroke-width="3" stroke-linecap="round"/>

  <!-- Mittelpunkt -->
  <circle cx="50" cy="54" r="3.5" fill="#89b4fa"/>

  <!-- Hammer links -->
  <line x1="34" y1="80" x2="28" y2="90" stroke="#89b4fa" stroke-width="3" stroke-linecap="round"/>
  <!-- Hammer rechts -->
  <line x1="66" y1="80" x2="72" y2="90" stroke="#89b4fa" stroke-width="3" stroke-linecap="round"/>
</svg>
